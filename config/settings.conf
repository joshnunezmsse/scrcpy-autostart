# scrcpy-autostart configuration

# Set to 'true' to launch scrcpy immediately upon connection.
# Set to 'false' to show a macOS system prompt first.
AUTO_LAUNCH=false

# Custom command line arguments passed to scrcpy.
# Default: --no-mouse-hover
# Example: --no-mouse-hover --turn-screen-off --stay-awake
CUSTOM_ARGS="--no-mouse-hover"